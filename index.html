<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>星界召喚師 — 數學奇航</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;
  font-family:'Noto Sans TC',sans-serif;color:#fff;touch-action:manipulation}

/* ── Screens ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;overflow:hidden}
.screen.active{display:flex}

/* ── Title ── */
#s-title{background:radial-gradient(ellipse at 50% 30%,#0d0d2e 0%,#000010 100%)}
#starCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.title-content{position:relative;z-index:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;height:100%;gap:18px;padding:24px;text-align:center}
.logo-main{font-family:'Orbitron',sans-serif;font-size:clamp(26px,6vw,52px);font-weight:900;
  background:linear-gradient(135deg,#00d4ff 0%,#7b2fff 50%,#ff6b00 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(0,212,255,0.6));letter-spacing:2px}
.logo-sub{font-size:clamp(14px,3.5vw,22px);color:#aaccff;letter-spacing:5px;margin-top:4px}
#titleHeroWrap{height:160px;display:flex;align-items:flex-end;justify-content:center;
  animation:titleFloat 2.5s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(0,212,255,0.7))}
#titleHeroWrap svg{height:160px;width:auto}
@keyframes titleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.btn-start{background:linear-gradient(135deg,#00d4ff,#0055cc);color:#fff;
  font-family:'Noto Sans TC',sans-serif;font-size:20px;font-weight:700;
  padding:16px 52px;border:none;border-radius:14px;cursor:pointer;letter-spacing:2px;
  box-shadow:0 0 20px rgba(0,212,255,0.5),0 4px 20px rgba(0,0,0,0.5);transition:all 0.2s}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 0 35px rgba(0,212,255,0.8)}
.title-tagline{color:#6688aa;font-size:13px;letter-spacing:2px}

/* ── Back button ── */
.back-btn{position:absolute;top:14px;left:14px;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.25);color:#ccd;padding:8px 18px;
  border-radius:8px;cursor:pointer;font-size:14px;z-index:10;font-family:'Noto Sans TC',sans-serif}

/* ── Planet Select ── */
#s-planet{background:radial-gradient(ellipse at 50% 40%,#0d0d2e,#000)}
.screen-big-title{font-family:'Orbitron',sans-serif;font-size:20px;color:#00d4ff;
  margin:20px 0 10px;letter-spacing:4px;text-shadow:0 0 10px #00d4ff}
.planets-grid{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;padding:20px}
.planet-card{width:140px;text-align:center;cursor:pointer;transition:transform 0.3s}
.planet-card:hover:not(.planet-locked){transform:scale(1.06)}
.planet-orb{width:120px;height:120px;border-radius:50%;margin:0 auto 10px;position:relative;
  display:flex;align-items:center;justify-content:center;font-size:44px;overflow:hidden}
.planet-burning .planet-orb{
  background:radial-gradient(circle at 35% 35%,#ff9a3c,#ff3300,#8b0000);
  box-shadow:0 0 30px #ff6600,0 0 60px #ff330055;animation:pPulse 2s ease-in-out infinite}
.planet-locked .planet-orb{background:#222;filter:blur(2px);box-shadow:none;color:#555}
@keyframes pPulse{0%,100%{box-shadow:0 0 25px #ff6600,0 0 50px #ff330044}
  50%{box-shadow:0 0 45px #ff9900,0 0 90px #ff660033}}
.planet-name{font-size:14px;font-weight:700;margin-top:6px}
.planet-sub{font-size:12px;color:#888;margin-top:3px}

/* ── World Map ── */
#s-world{background:linear-gradient(180deg,#1a0505,#3d0000,#140000)}
.ops-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;
  padding:14px;width:100%;max-width:420px;margin-top:4px}
.op-card{background:rgba(0,0,0,0.45);border:2px solid rgba(255,100,0,0.35);
  border-radius:16px;padding:18px 14px;text-align:center;cursor:pointer;transition:all 0.25s}
.op-card:hover{border-color:#ff6b00;transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(255,107,0,0.3)}
.op-icon{font-size:34px;font-family:'Orbitron',sans-serif;color:#ff9944;margin-bottom:6px}
.op-name{font-size:17px;font-weight:700;color:#ffcc88}
.op-progress-wrap{height:4px;background:#333;border-radius:2px;margin-top:10px;overflow:hidden}
.op-progress-bar{height:100%;background:linear-gradient(90deg,#ff6b00,#ffd700);border-radius:2px;transition:width 0.5s}
.op-count{font-size:11px;color:#aa7744;margin-top:5px}

/* ── Level Select ── */
#s-levels{background:linear-gradient(180deg,#1a0505,#3d0000,#140000);overflow-y:auto}
.lvl-header{display:flex;align-items:center;padding:12px 14px;
  background:rgba(26,5,5,0.96);position:sticky;top:0;z-index:10;width:100%;gap:10px;
  border-bottom:1px solid rgba(255,100,0,0.25)}
.lvl-header h2{font-family:'Orbitron',sans-serif;font-size:17px;color:#ff9944}
.lvl-back-btn{background:none;border:none;color:#ff9944;font-size:22px;cursor:pointer;padding:4px}
.levels-list{width:100%;max-width:440px;padding:12px;display:flex;flex-direction:column;gap:10px}
.level-card{background:rgba(0,0,0,0.5);border:2px solid rgba(255,100,0,0.28);
  border-radius:12px;padding:14px;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;gap:12px}
.level-card:hover:not(.locked){border-color:#ff7700;transform:translateX(4px)}
.level-card.locked{opacity:0.38;cursor:not-allowed}
.level-icon{font-size:30px;flex-shrink:0}
.level-info{flex:1;min-width:0}
.level-name{font-size:14px;font-weight:700;color:#ffcc88}
.level-meta{font-size:11px;color:#886644;margin-top:2px}
.level-rec{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.grade-chip{padding:2px 9px;border-radius:6px;font-size:12px;font-weight:700;
  font-family:'Orbitron',sans-serif;flex-shrink:0}
.g-S{background:#ffd700;color:#000}
.g-A{background:#00d4ff;color:#000}
.g-B{background:#7b2fff;color:#fff}
.g-C{background:#555;color:#fff}
.level-score{font-size:11px;color:#aa8866}
.lock-icon{font-size:20px;margin-left:auto}
.level-num-badge{width:46px;height:46px;border-radius:50%;
  background:rgba(255,150,0,0.12);border:2px solid rgba(255,120,0,0.45);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:'Orbitron',sans-serif;font-size:17px;font-weight:900;color:#ffaa44}

/* ── Screen fade transition ── */
.screen{transition:opacity 0.2s ease}
.screen.fade-out{opacity:0;pointer-events:none}

/* ── Breadcrumb ── */
.breadcrumb{font-size:12px;color:#776655;padding:6px 14px 0;
  letter-spacing:0.5px;width:100%;line-height:1.6;flex-shrink:0}
.breadcrumb span{cursor:pointer;transition:color 0.15s}
.breadcrumb span:hover{color:#ffaa66}
.breadcrumb .bc-sep{color:#443322;margin:0 4px;cursor:default}
.breadcrumb .bc-cur{color:#ff9944;cursor:default;font-weight:700}

/* ── Level list progress bar ── */
.lvl-progress-row{width:100%;max-width:440px;padding:8px 12px 2px;
  display:flex;align-items:center;gap:10px;flex-shrink:0}
.lvl-prog-label{font-size:12px;color:#aa7744;white-space:nowrap}
.lvl-prog-bar{flex:1;height:6px;background:#2a1000;border-radius:3px;overflow:hidden}
.lvl-prog-fill{height:100%;background:linear-gradient(90deg,#ff7700,#ffd700);
  border-radius:3px;transition:width 0.4s}

/* ── Pause Modal ── */
.pause-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);
  z-index:200;display:none;align-items:center;justify-content:center}
.pause-overlay.active{display:flex}
.pause-box{background:linear-gradient(180deg,#0d0030,#050010);
  border:2px solid rgba(100,100,255,0.4);border-radius:18px;
  padding:28px 24px;text-align:center;max-width:320px;width:90%}
.pause-title{font-family:'Orbitron',sans-serif;font-size:24px;color:#aabbff;
  margin-bottom:14px}
.pause-msg{font-size:13px;color:#8899bb;line-height:1.7;margin-bottom:20px}
.pause-btn-row{display:flex;flex-direction:column;gap:10px}

/* HUD pause button */
.hud-pause{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);
  color:#ccd;width:32px;height:32px;border-radius:8px;cursor:pointer;
  font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── Intro ── */
#s-intro{background:radial-gradient(ellipse at 50% 50%,#200000,#000);
  justify-content:center;align-items:center}
.intro-box{text-align:center;z-index:1;padding:20px}
.intro-level-tag{font-family:'Orbitron',sans-serif;font-size:14px;color:#ff9944;
  letter-spacing:3px;margin-bottom:14px}
.intro-vs-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
.intro-hero-name{font-size:20px;font-weight:700;color:#00d4ff}
.intro-vs{font-size:14px;color:#888}
.intro-mon-name{font-size:20px;font-weight:700;color:#ff4422}
.countdown-num{font-family:'Orbitron',sans-serif;font-size:110px;font-weight:900;
  color:#ffd700;text-shadow:0 0 40px #ffd700,0 0 80px #ffd70066;
  line-height:1;margin-top:20px;min-height:120px;display:flex;align-items:center;justify-content:center}
.countdown-num.pop{animation:cPop 0.85s ease-out forwards}
@keyframes cPop{0%{transform:scale(1.8);opacity:0}30%{opacity:1;transform:scale(1)}
  80%{transform:scale(0.95);opacity:1}100%{transform:scale(0.9);opacity:0.6}}

/* ── Game Screen ── */
#s-game{background:#000;flex-direction:column}

/* HUD */
.hud{width:100%;background:rgba(0,0,0,0.85);border-bottom:1px solid rgba(255,107,0,0.3);
  padding:5px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;min-height:54px}
.hud-left{display:flex;flex-direction:column;align-items:flex-start;min-width:70px}
.hearts-row{font-size:15px;letter-spacing:1px;line-height:1.2}
.hud-center{flex:1;text-align:center;min-width:0}
.hud-level-tag{font-size:9px;color:#888;font-family:'Orbitron',sans-serif;letter-spacing:1px}
.timer-big{font-family:'Orbitron',sans-serif;font-size:30px;font-weight:900;
  color:#ffd700;text-shadow:0 0 10px #ffd700;line-height:1.1}
.timer-big.danger{color:#ff2200;text-shadow:0 0 15px #ff2200;
  animation:tFlash 0.5s ease-in-out infinite alternate}
@keyframes tFlash{from{opacity:1}to{opacity:0.4}}
.hud-q-info{font-size:10px;color:#aaa;font-family:'Orbitron',sans-serif}
.hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:80px}
.mon-hp-bar{width:78px;height:8px;background:#1a0000;border-radius:4px;overflow:hidden;
  border:1px solid rgba(255,80,0,0.4)}
.mon-hp-fill{height:100%;background:linear-gradient(90deg,#ff2200,#ff7700);
  border-radius:4px;transition:width 0.35s ease}
.mon-hp-txt{font-size:10px;color:#ff7700;font-family:'Orbitron',sans-serif}
.score-disp{font-size:11px;color:#ffd700;font-family:'Orbitron',sans-serif}

/* Battle Stage */
.battle-stage{flex:1;position:relative;overflow:hidden;min-height:0;
  display:flex;align-items:flex-end;justify-content:space-between;padding:0 8px 12px}
.stage-bg{position:absolute;inset:0;z-index:0;
  background:linear-gradient(180deg,#1a000a 0%,#3d0500 22%,#7a1500 50%,#bb3300 72%,#220000 100%)}
.volcano-layer{position:absolute;bottom:0;left:0;right:0;z-index:1;pointer-events:none}
.lava-crack{position:absolute;bottom:0;left:0;right:0;height:18px;z-index:2;
  background:repeating-linear-gradient(90deg,#ff4400 0px,#ff8800 18px,#cc2200 36px,#ff4400 54px);
  animation:lavaShift 2.5s linear infinite}
@keyframes lavaShift{from{background-position:0}to{background-position:54px 0}}
.fire-particles{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden}
.spark{position:absolute;border-radius:50% 50% 40% 40%;animation:sparkUp linear infinite;opacity:0}
@keyframes sparkUp{
  0%{transform:translateY(0) translateX(0);opacity:0.9}
  40%{opacity:0.7;transform:translateY(-35vh) translateX(var(--dx))}
  100%{transform:translateY(-85vh) translateX(calc(var(--dx)*1.8));opacity:0}}

/* Fighter layout */
.fighter-wrap{position:relative;z-index:10;display:flex;flex-direction:column;
  align-items:center;gap:6px}
.fighter-label{font-size:11px;color:rgba(255,255,255,0.65);font-weight:700;
  text-shadow:0 1px 4px rgba(0,0,0,0.8)}
.fighter-sprite{min-width:80px;min-height:160px;display:flex;
  align-items:flex-end;justify-content:center;position:relative}
.fighter-sprite svg{height:clamp(140px,21vh,190px);width:auto;overflow:visible}

/* Idle animations */
[data-char="hero"]{animation:fHero 2.2s ease-in-out infinite;
  filter:drop-shadow(0 0 12px rgba(0,212,255,0.55))}
[data-char="imp"]{animation:fImp 1.7s ease-in-out infinite;
  filter:drop-shadow(0 0 14px rgba(255,120,0,0.65))}
[data-char="golem"]{animation:fGolem 3s ease-in-out infinite;
  filter:drop-shadow(0 0 12px rgba(255,100,0,0.4))}
[data-char="dragon"]{animation:fDragon 2.4s ease-in-out infinite;
  filter:drop-shadow(0 0 14px rgba(255,60,0,0.6))}
[data-char="demon"]{animation:fDemon 2s ease-in-out infinite;
  filter:drop-shadow(0 0 18px rgba(150,0,255,0.75))}
@keyframes fHero{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fImp{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(-10px) scaleY(1.07)}}
@keyframes fGolem{0%,100%{transform:rotate(0deg) translateX(0)}33%{transform:rotate(-2deg) translateX(-4px)}66%{transform:rotate(2deg) translateX(4px)}}
@keyframes fDragon{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.02)}}
@keyframes fDemon{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.04)}}

/* Battle animation classes */
.anim-hero-atk{animation:heroAtk 0.5s ease-in-out forwards !important}
.anim-mon-atk{animation:monAtk 0.5s ease-in-out forwards !important}
.anim-flash-hit{animation:flashHit 0.3s ease-in-out !important}
.anim-flash-hurt{animation:flashHurt 0.3s ease-in-out !important}
.anim-shake{animation:doShake 0.3s ease-in-out !important}
@keyframes heroAtk{0%{transform:translateX(0)}45%{transform:translateX(90px)}100%{transform:translateX(0)}}
@keyframes monAtk{0%{transform:translateX(0)}45%{transform:translateX(-80px)}100%{transform:translateX(0)}}
@keyframes flashHit{0%,100%{filter:none}50%{filter:brightness(8) drop-shadow(0 0 25px #fff)}}
@keyframes flashHurt{0%,100%{filter:none}50%{filter:brightness(3) sepia(1) hue-rotate(-20deg) drop-shadow(0 0 20px #f00)}}
@keyframes doShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}

/* Score float popup */
.score-float{position:absolute;left:50%;top:45%;transform:translateX(-50%);
  z-index:40;pointer-events:none;text-align:center;
  font-family:'Orbitron',sans-serif;font-weight:900;
  color:#ffd700;text-shadow:0 0 12px #ffd700,0 0 24px #ff9900;
  font-size:clamp(32px,5.5vw,48px);
  animation:scoreUp 0.85s ease-out forwards}
.score-float .sf-label{font-size:clamp(14px,2.5vw,18px);color:#ffe066;
  font-family:'Noto Sans TC',sans-serif;letter-spacing:2px;margin-top:2px}
@keyframes scoreUp{
  0%{opacity:1;transform:translateX(-50%) translateY(0) scale(0.8)}
  30%{opacity:1;transform:translateX(-50%) translateY(-20px) scale(1.1)}
  100%{opacity:0;transform:translateX(-50%) translateY(-80px) scale(0.9)}}

/* Screen flash overlay */
.screen-flash-overlay{position:absolute;inset:0;z-index:50;pointer-events:none;opacity:0}
.sfo-yellow{animation:sfoY 0.35s ease-out forwards}
.sfo-red{animation:sfoR 0.35s ease-out forwards}
@keyframes sfoY{0%{opacity:0.5;background:#ffd700}100%{opacity:0;background:#ffd700}}
@keyframes sfoR{0%{opacity:0.4;background:#ff0000}100%{opacity:0;background:#ff0000}}

/* Question area */
.q-area{width:100%;background:rgba(0,0,0,0.8);
  border-top:1px solid rgba(255,107,0,0.35);border-bottom:1px solid rgba(255,107,0,0.35);
  padding:10px 12px;flex-shrink:0}
.q-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:10px}
.q-bar-wrap{flex:1;height:5px;background:#1a0a00;border-radius:3px;overflow:hidden}
.q-bar{height:100%;background:linear-gradient(90deg,#00d4ff,#ffd700);
  border-radius:3px;transition:width 0.12s linear;width:100%}
.wrong-row{font-size:15px;letter-spacing:3px;flex-shrink:0}
.q-display{text-align:center;font-family:'Orbitron',sans-serif;
  font-size:clamp(22px,5.5vw,34px);font-weight:700;color:#ffffff;
  letter-spacing:3px;text-shadow:0 0 12px rgba(255,255,255,0.25);line-height:1.3}
.ans-display{text-align:center;font-family:'Orbitron',sans-serif;
  font-size:clamp(18px,4.5vw,28px);color:#00d4ff;font-weight:700;
  min-height:30px;letter-spacing:4px;margin-top:3px}

/* Numpad */
.numpad{width:100%;max-width:370px;margin:0 auto;padding:8px;flex-shrink:0;
  display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.nbtn{height:52px;border:none;border-radius:10px;font-size:21px;font-weight:700;
  font-family:'Orbitron',sans-serif;cursor:pointer;transition:all 0.1s;user-select:none;
  background:rgba(22,22,55,0.92);border:1px solid rgba(88,88,180,0.3);color:#dde}
.nbtn:active{transform:scale(0.92);background:rgba(50,50,110,0.95)}
.nbtn.span2{grid-column:span 2}
.nbtn.clr{background:rgba(80,15,15,0.92);border-color:rgba(220,50,50,0.4);color:#ff9999}
.nbtn.ok{background:rgba(8,65,18,0.92);border-color:rgba(40,220,80,0.4);color:#44ff66;
  box-shadow:0 0 10px rgba(40,220,80,0.25);font-size:24px}
.nbtn.ok:hover{box-shadow:0 0 22px rgba(40,220,80,0.5)}

/* ── Win ── */
#s-win{background:radial-gradient(ellipse at 50% 30%,#001833,#000010);
  justify-content:center;align-items:center;overflow-y:auto}
.win-box{text-align:center;padding:24px 20px;width:100%;max-width:400px}
.win-title{font-family:'Orbitron',sans-serif;font-size:34px;font-weight:900;
  color:#ffd700;text-shadow:0 0 20px #ffd700;margin-bottom:12px}
.grade-big{font-family:'Orbitron',sans-serif;font-size:88px;font-weight:900;line-height:1;
  animation:gradeIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275)}
@keyframes gradeIn{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.gb-S{color:#ffd700;text-shadow:0 0 30px #ffd700,0 0 60px #ffd70088}
.gb-A{color:#00d4ff;text-shadow:0 0 25px #00d4ff}
.gb-B{color:#cc88ff;text-shadow:0 0 20px #7b2fff}
.gb-C{color:#aaaaaa}
.win-score{font-family:'Orbitron',sans-serif;font-size:22px;color:#fff;margin:10px 0}
.win-stars{font-size:18px;color:#ffd700;margin:6px 0}
.win-acc{font-size:13px;color:#888;margin-bottom:14px}
.treasure-box{background:rgba(255,215,0,0.08);border:2px solid rgba(255,215,0,0.7);
  border-radius:14px;padding:14px;margin:12px 0;animation:tGlow 1.2s ease-in-out infinite alternate}
@keyframes tGlow{from{box-shadow:0 0 10px rgba(255,215,0,0.3)}to{box-shadow:0 0 30px rgba(255,215,0,0.7),0 0 60px rgba(255,215,0,0.3)}}
.treasure-big-icon{font-size:42px}
.treasure-got-name{font-size:14px;color:#ffd700;margin-top:6px;font-weight:700}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.btn-main{background:linear-gradient(135deg,#00d4ff,#0055cc);color:#fff;
  font-family:'Noto Sans TC',sans-serif;font-size:16px;font-weight:700;
  padding:12px 28px;border:none;border-radius:10px;cursor:pointer;transition:all 0.2s}
.btn-main:hover{transform:translateY(-2px)}
.btn-sec{background:rgba(25,25,60,0.9);border:1px solid rgba(100,100,200,0.4);

/* ── Celebration Screen ── */

.celeb-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.celeb-burst{position:absolute;border-radius:50%;animation:burstOut linear forwards}
@keyframes burstOut{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1}
  100%{transform:translate(calc(-50% + var(--bx)),calc(-50% + var(--by))) scale(1);opacity:0}}
.celeb-box{position:relative;z-index:1;text-align:center;padding:30px 24px;max-width:380px}
.celeb-title{font-family:'Noto Sans TC',sans-serif;font-size:clamp(20px,5vw,28px);

.celeb-unlock{font-size:15px;color:#88ffaa;margin-bottom:20px;line-height:1.6}
.celeb-hero{height:140px;display:flex;align-items:flex-end;justify-content:center;

.celeb-hero svg{height:140px;width:auto}
@keyframes celebHero{
  from{transform:translateY(0) rotate(-5deg)}
  to{transform:translateY(-10px) rotate(5deg)}}
.celeb-continue{opacity:0;transition:opacity 0.5s;
  font-family:'Orbitron',sans-serif;font-size:16px;color:#ffd700;
  padding:12px 32px;border:2px solid #ffd700;border-radius:12px;

  box-shadow:0 0 15px rgba(255,215,0,0.4);margin-top:8px}
.celeb-continue.visible{opacity:1}

#s-collection{background:radial-gradient(ellipse at 50% 30%,#080020,#000010);overflow-y:auto}
.coll-header{display:flex;align-items:center;padding:12px 14px;
  background:rgba(8,0,32,0.96);position:sticky;top:0;z-index:10;width:100%;
  gap:10px;border-bottom:1px solid rgba(255,215,0,0.2)}
.coll-header h2{font-family:'Orbitron',sans-serif;font-size:17px;color:#ffd700}
.coll-back{background:none;border:none;color:#ffd700;font-size:22px;cursor:pointer;padding:4px}
.stars-total-row{font-family:'Orbitron',sans-serif;font-size:20px;color:#ffd700;
  text-shadow:0 0 10px #ffd700;margin:14px 0;text-align:center}
.treasures-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;

.t-slot{background:rgba(255,215,0,0.04);border:1px solid rgba(255,215,0,0.15);

.t-slot .tsn{font-size:10px;color:#ffd700;font-weight:700;line-height:1.3}
.t-slot .tsf{font-size:9px;color:#666}
.t-slot.locked-t .tsi{opacity:0.18;filter:grayscale(1)}

];

// ═══════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════
const SS = {
  stars(){return +localStorage.getItem('mc_stars')||0},
  addStars(n){localStorage.setItem('mc_stars',this.stars()+n)},
  lv(id){try{return JSON.parse(localStorage.getItem('mc_lv_'+id))||null}catch{return null}},
  saveLv(id,d){localStorage.setItem('mc_lv_'+id,JSON.stringify(d))},
  unlocked(id){
    const i=UNLOCK_CHAIN.indexOf(id);
    if(i<=0)return true;
    return !!SS.lv(UNLOCK_CHAIN[i-1]);

  treasures(){try{return JSON.parse(localStorage.getItem('mc_tr'))||[]}catch{return[]}},
  hasTr(id){return SS.treasures().includes(id)},
  addTr(id){const t=SS.treasures();if(!t.includes(id)){t.push(id);localStorage.setItem('mc_tr',JSON.stringify(t))}},

  return `<svg viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg" overflow="visible">

  <radialGradient id="hg0"><stop offset="0%" stop-color="${c}" stop-opacity=".55"/><stop offset="100%" stop-color="${c}" stop-opacity="0"/></radialGradient>
  <filter id="hf"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<ellipse cx="30" cy="78" rx="22" ry="7" fill="url(#hg0)"/>
<!-- legs -->

<rect x="32" y="66" width="10" height="18" rx="3" fill="#192866"/>
<rect x="16" y="79" width="13" height="6" rx="2" fill="#253898"/>
<rect x="31" y="79" width="13" height="6" rx="2" fill="#253898"/>

// ═══════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════
let _ac=null;
function ac(){
  if(!_ac) _ac=new(window.AudioContext||window.webkitAudioContext)();
  if(_ac.state==='suspended') _ac.resume();
  return _ac;
}
function tone(f,d,t='sine',v=0.3,a=0.01){
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(0,c.currentTime);
    g.gain.linearRampToValueAtTime(v,c.currentTime+a);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
    o.start();o.stop(c.currentTime+d+0.05);
  }catch(e){}
}
function sfx(n){
  if(n==='correct'){tone(880,.1,'sine',.4);setTimeout(()=>tone(1320,.15,'sine',.3),80);}
  else if(n==='wrong'){tone(180,.4,'sawtooth',.25);}
  else if(n==='fail'){[440,370,310,250].forEach((f,i)=>setTimeout(()=>tone(f,.25,'sine',.3),i*130));}
  else if(n==='win'){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.3,'sine',.35),i*140));}
  else if(n==='srank'){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,.25,'sine',.45),i*95));
    setTimeout(()=>{tone(784,.6,'sine',.4);tone(988,.6,'sine',.3);tone(1175,.6,'sine',.3)},520);}
  else if(n==='frag'){tone(1047,.09,'sine',.12);}
  else if(n==='key'){tone(660,.055,'sine',.08);}
  else if(n==='beep'){tone(440,.08,'square',.08);}
}

// STAR CANVAS
// ═══════════════════════════════════════════════
function initStars(){
  const cv=document.getElementById('starCanvas');
  const ctx=cv.getContext('2d');
  let W=cv.width=window.innerWidth, H=cv.height=window.innerHeight;
  const stars=Array.from({length:220},()=>({
    x:Math.random()*W, y:Math.random()*H,
    r:Math.random()*1.8+0.3,
    t:Math.random()*Math.PI*2, s:0.0015+Math.random()*0.003
  }));
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(const s of stars){
      s.t+=s.s;
      const a=0.35+0.65*Math.abs(Math.sin(s.t));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${a.toFixed(2)})`;ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize',()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;});
}

  for(let i=0;i<28;i++){
    const d=document.createElement('div');
    d.className='spark';
    const w=2+Math.random()*4, h=4+Math.random()*9;
    d.style.cssText=`left:${Math.random()*100}%;bottom:${Math.random()*12}%;`+
      `width:${w}px;height:${h}px;background:${cls[i%cls.length]};`+
      `--dx:${(Math.random()-.5)*90}px;`+
      `animation-duration:${1.4+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
    c.appendChild(d);
  }
}

// ═══════════════════════════════════════════════
// QUESTION GENERATION
// ═══════════════════════════════════════════════
function r(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function genQ(id){
  let a,b,ans,text;
  switch(id){
    case'1': a=r(1,9);b=r(1,9);ans=a+b;text=`${a} ＋ ${b} = ?`;break;
    case'2': a=r(10,99);b=r(1,9);ans=a+b;text=`${a} ＋ ${b} = ?`;break;
    case'3': a=r(10,99);b=r(10,99);ans=a+b;text=`${a} ＋ ${b} = ?`;break;
    case'4': a=r(100,999);b=r(10,99);ans=a+b;text=`${a} ＋ ${b} = ?`;break;
    case'5': a=r(100,999);b=r(100,999);ans=a+b;text=`${a} ＋ ${b} = ?`;break;
    case'6': b=r(1,9);a=r(b,9);ans=a-b;text=`${a} － ${b} = ?`;break;
    case'7': b=r(1,9);a=r(Math.max(10,b+1),99);ans=a-b;text=`${a} － ${b} = ?`;break;
    case'8': b=r(10,49);a=r(b+1,99);ans=a-b;text=`${a} － ${b} = ?`;break;
    case'9': b=r(10,99);a=r(100,999);ans=a-b;text=`${a} － ${b} = ?`;break;
    case'10':b=r(100,499);a=r(b+1,999);ans=a-b;text=`${a} － ${b} = ?`;break;
    case'11':a=r(1,9);b=r(1,9);ans=a*b;text=`${a} × ${b} = ?`;break;
    case'12':a=r(10,99);b=r(2,9);ans=a*b;text=`${a} × ${b} = ?`;break;
    case'13':a=r(10,99);b=r(10,99);ans=a*b;text=`${a} × ${b} = ?`;break;
    case'14':a=r(100,999);b=r(2,9);ans=a*b;text=`${a} × ${b} = ?`;break;
    // 關卡15：九九乘法表範圍 b=2~9, quotient=2~9, a=10~81
    case'15':{b=r(2,9);let m=r(2,9);a=b*m;let tries=0;while(a<10&&tries++<30){m=r(2,9);a=b*m;}ans=a/b;text=`${a} ÷ ${b} = ?`;}break;
    // 關卡16：非九九範圍 quotient=10~11
    case'16':{b=r(2,9);let m=r(10,11);a=b*m;let tries=0;while((a<10||a>99)&&tries++<30){b=r(2,9);m=r(10,11);a=b*m;}ans=a/b;text=`${a} ÷ ${b} = ?`;}break;
    case'17':{b=r(11,19);let m=r(2,5);a=b*m;let tries=0;while((a<10||a>99)&&tries++<30){m=r(2,5);a=b*m;}ans=a/b;text=`${a} ÷ ${b} = ?`;}break;
    case'18':{b=r(2,9);let m=r(12,111);a=b*m;let tries=0;while((a<100||a>999)&&tries++<30){m=r(12,111);a=b*m;}ans=a/b;text=`${a} ÷ ${b} = ?`;}break;
    default: a=r(1,9);b=r(1,9);ans=a+b;text=`${a} ＋ ${b} = ?`;
  }
  return {text,ans};
}

// ═══════════════════════════════════════════════
// SCORE CALC
// ═══════════════════════════════════════════════
function calcPts(id,secs,wrongs){
  const {sc,df}=LEVELS[id];
  let base=df;
  for(const[lim,pts] of sc){if(secs<=lim){base=pts;break;}}
  return Math.max(base-wrongs*50,0);
}
function gradeV(g){return{S:4,A:3,B:2,C:1}[g]||0;}

// ═══════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════
let curId=null;
let GS={};

function startLevel(id){
  curId=id;
  const lv=LEVELS[id];
  GS={
    heroHp:3, monHp:10, score:0,
    qIdx:0, ans:'',
    qs:Array.from({length:10},()=>genQ(id)),
    totalQ:10, qStartT:0,
    lvTimeLeft:lv.time,
    lvTimerId:null, qTimerId:null,
    wrongThisQ:0,   // 本題答錯次數（顯示用）
    wrongTotal:0,   // 整關累計答錯次數（扣命用）
    totalCorrect:0, starsEarned:0,
  };
  // Intro
  document.getElementById('introTag').textContent=`關卡 ${id}　${lv.name}`;
  document.getElementById('introMonName').textContent=lv.mnm;
  goTo('s-intro');
  runCountdown(['3','2','1','GO!'],()=>{
    goTo('s-game');
    setupGame();
    initFire();
    startLvTimer();
    nextQ();
  });
}

function runCountdown(steps,done){
  const el=document.getElementById('cdNum');
  let i=0;
  function tick(){
    if(i>=steps.length){done();return;}
    el.textContent=steps[i++];
    el.classList.remove('pop');
    requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('pop')));
    setTimeout(tick,900);
  }
  tick();
}

function setupGame(){
  const lv=LEVELS[curId];
  document.getElementById('hudTag').textContent=`關卡 ${curId}　${lv.name}`;
  document.getElementById('monLabel').textContent=lv.mnm;
  const hs=document.getElementById('heroSprite');
  hs.innerHTML=heroSVG(3);
  hs.dataset.char='hero';
  const ms=document.getElementById('monSprite');
  ms.innerHTML=MON_SVG_FN[lv.mon]();
  ms.dataset.char=lv.mon;
  updateHUD();
}

function updateHUD(){
  const g=GS;
  document.getElementById('heartsRow').textContent='❤️'.repeat(Math.max(0,g.heroHp))+'🖤'.repeat(Math.max(0,3-g.heroHp));
  const td=document.getElementById('timerBig');
  td.textContent=g.lvTimeLeft;
  td.className='timer-big'+(g.lvTimeLeft<=30?' danger':'');
  document.getElementById('hudQInfo').textContent=`第 ${g.qIdx+1} / ${g.totalQ} 題`;
  document.getElementById('monHpFill').style.width=(g.monHp/g.totalQ*100)+'%';
  document.getElementById('monHpTxt').textContent=`${g.monHp}/${g.totalQ}`;
  document.getElementById('scoreDisp').textContent=`${g.score}分`;
  // refresh hero (HP colour changes)
  const hs=document.getElementById('heroSprite');
  hs.innerHTML=heroSVG(g.heroHp);
}

function startLvTimer(){
  GS.lvTimerId=setInterval(()=>{
    GS.lvTimeLeft--;
    const td=document.getElementById('timerBig');
    td.textContent=GS.lvTimeLeft;
    td.className='timer-big'+(GS.lvTimeLeft<=30?' danger':'');
    if(GS.lvTimeLeft<=30) sfx('beep');
    if(GS.lvTimeLeft<=0){clearTimers();endGame('timeout');}
  },1000);
}

function clearTimers(){
  clearInterval(GS.lvTimerId);
  clearInterval(GS.qTimerId);
  GS.lvTimerId=GS.qTimerId=null;
}

function nextQ(){
  if(GS.qIdx>=GS.totalQ){clearTimers();endGame('win');return;}
  const q=GS.qs[GS.qIdx];
  GS.ans='';
  GS.wrongThisQ=0;
  GS.qStartT=Date.now();
  document.getElementById('qDisplay').textContent=q.text;
  document.getElementById('ansDisplay').textContent='_';
  // wrongRow shows cumulative hearts used: ✗ = lost, ○ = remaining
  const used=3-GS.heroHp;
  document.getElementById('wrongRow').textContent='✗'.repeat(used)+'○'.repeat(Math.max(0,3-used));
  // per-question timer bar
  clearInterval(GS.qTimerId);
  const maxSecs=LEVELS[curId].sc[LEVELS[curId].sc.length-1][0]+8;
  GS.qTimerId=setInterval(()=>{
    const el=(Date.now()-GS.qStartT)/1000;
    document.getElementById('qBar').style.width=Math.max(0,100-el/maxSecs*100)+'%';
  },100);
}

function submit(){
  const num=parseInt(GS.ans,10);
  if(isNaN(num)||GS.ans==='') return;
  const q=GS.qs[GS.qIdx];
  const secs=(Date.now()-GS.qStartT)/1000;
  if(num===q.ans){
    sfx('correct');
    const pts=calcPts(curId,secs,GS.wrongThisQ);
    GS.score+=pts;
    GS.starsEarned++;
    GS.totalCorrect++;
    GS.monHp--;
    clearInterval(GS.qTimerId);
    showScoreFloat(pts, secs);
    doCorrectAnim(()=>{
      GS.qIdx++;
      updateHUD();
      if(GS.monHp<=0){clearTimers();endGame('win');}
      else nextQ();
    });
  } else {
    sfx('wrong');
    GS.wrongThisQ++;
    GS.wrongTotal++;
    GS.score=Math.max(GS.score-50,-999);
    GS.heroHp--;
    updateHUD();
    clearInterval(GS.qTimerId);
    if(GS.heroHp<=0){
      // 累計 3 次答錯 → 失敗
      doWrongAnim(()=>{clearTimers();endGame('fail');});
    } else {
      doWrongAnim(()=>{
        GS.ans='';
        document.getElementById('ansDisplay').textContent='_';
        // 更新本題顯示（保留本題錯誤標記，但同步累計心數）
        GS.wrongThisQ=0; // 每題計數重置（僅顯示用）
        const used=3-GS.heroHp;
        document.getElementById('wrongRow').textContent=
          '✗'.repeat(used)+'○'.repeat(Math.max(0,3-used));
        // 繼續本題（不跳到下一題）
      });
    }
  }
}

function showScoreFloat(pts, secs){
  const stage=document.getElementById('battleStage');
  const old=stage.querySelector('.score-float');
  if(old) old.remove();
  const lv=LEVELS[curId];
  const topScore=lv.sc[0][1];
  const secondScore=lv.sc.length>1?lv.sc[1][1]:topScore;
  let label='';
  if(pts>=topScore) label='完美！';
  else if(pts>=secondScore) label='很快！';
  const div=document.createElement('div');
  div.className='score-float';
  div.innerHTML=`+${pts}<div class="sf-label">${label}</div>`;
  stage.appendChild(div);
  setTimeout(()=>div.remove(),900);
}

function doCorrectAnim(cb){
  const hs=document.getElementById('heroSprite');
  const ms=document.getElementById('monSprite');
  const fo=document.getElementById('sfo');
  hs.classList.add('anim-hero-atk');
  setTimeout(()=>{
    hs.classList.remove('anim-hero-atk');
    ms.classList.add('anim-flash-hit','anim-shake');
    fo.className='screen-flash-overlay sfo-yellow';
    setTimeout(()=>{ms.classList.remove('anim-flash-hit','anim-shake');fo.className='screen-flash-overlay';cb();},320);
  },250);
}

function doWrongAnim(cb){
  const hs=document.getElementById('heroSprite');
  const ms=document.getElementById('monSprite');
  const fo=document.getElementById('sfo');
  ms.classList.add('anim-mon-atk');
  setTimeout(()=>{
    ms.classList.remove('anim-mon-atk');
    hs.classList.add('anim-flash-hurt','anim-shake');
    fo.className='screen-flash-overlay sfo-red';
    setTimeout(()=>{hs.classList.remove('anim-flash-hurt','anim-shake');fo.className='screen-flash-overlay';cb();},320);
  },250);
}

// ═══════════════════════════════════════════════
// END GAME
// ═══════════════════════════════════════════════
function endGame(result){
  clearTimers();
  SS.addStars(GS.starsEarned);

  if(result==='win'){
    const lv=LEVELS[curId];
    let grade='C';
    if(GS.score>=lv.S) grade='S';
    else if(GS.score>=lv.A) grade='A';
    else if(GS.score>=lv.B) grade='B';

    const bonusMap={S:100,A:50,B:30,C:10};
    const bonus=bonusMap[grade];
    SS.addStars(bonus);
    if(grade==='S') sfx('srank'); else sfx('win');

    let gotTreasure=false;
    if(grade==='S'&&!SS.hasTr(curId)){SS.addTr(curId);gotTreasure=true;}

    const prev=SS.lv(curId)||{};
    SS.saveLv(curId,{
      score:Math.max(GS.score,prev.score||0),
      grade:gradeV(grade)>=gradeV(prev.grade||'') ? grade : prev.grade,
      treasure:gotTreasure||prev.treasure||false,
    });

    const showWinScreen=()=>{
    goTo('s-win');
    const gEl=document.getElementById('winGrade');
    gEl.textContent=grade;
    gEl.className='grade-big gb-'+grade;
    document.getElementById('winScore').textContent=`得分：${GS.score}`;
    document.getElementById('winStars').textContent=`⭐ 本次獲得：+${GS.starsEarned+bonus} 顆`;
    document.getElementById('winStarsTotal').textContent=`累積總碎片：${SS.stars()} 顆`;
    document.getElementById('winAcc').textContent=`答對 ${GS.totalCorrect}/10 題 | 正確率 ${GS.totalCorrect*10}%`;
    const tb=document.getElementById('treasureBox');
    if(gotTreasure){
      tb.style.display='block';
      document.getElementById('treasureBigIcon').textContent=lv.tr.i;
      document.getElementById('treasureGotName').textContent=`🎉 首次獲得寶物：${lv.tr.n}！`;
    } else tb.style.display='none';

    // Build buttons
    const nextId=String(+curId+1);
    const hasNext=!!LEVELS[nextId];
    const isLast=curId==='18';
    const btnRow=document.getElementById('winBtnRow');
    btnRow.innerHTML='';
    const addBtn=(text,cls,fn)=>{
      const b=document.createElement('button');
      b.className=cls; b.textContent=text;
      b.onclick=fn; btnRow.appendChild(b);
    };
    addBtn('🔄 再挑戰','btn-main',()=>retryLevel());
    if(!isLast&&hasNext){
      addBtn('➡️ 下一關','btn-main',()=>startLevel(nextId));
    } else {
      addBtn('🗺️ 回地圖','btn-sec',()=>goTo('s-world'));
    }
    if(grade!=='S'){
      addBtn('💪 去練功','btn-sec',()=>alert('練功區即將推出，敬請期待！'));
    }
    if(!isLast||grade==='S'){
      addBtn('🗺️ 回地圖','btn-sec',()=>goTo('s-world'));
    }
    }; // end showWinScreen
    // Check if this is a milestone level → show celebration first
    if(CELEB_DATA[curId]) showCelebration(curId, showWinScreen);
    else showWinScreen();

  } else {
    sfx('fail');
    goTo('s-lose');
    document.getElementById('loseMsg').textContent=FAIL_MSGS[Math.floor(Math.random()*FAIL_MSGS.length)];
    document.getElementById('loseStats').textContent=`已答對 ${GS.totalCorrect} 題 | 獲得 ${GS.starsEarned} 顆星星碎片`;
  }
}

const CELEB_DATA = {
  '5': {title:'🔥 加法試煉完成！\n你已掌握加法的力量！',unlock:'🔓 減法試煉已解鎖！'},
  '10':{title:'⚡ 減法試煉完成！\n減法對你毫無難度！',unlock:'🔓 乘法試煉已解鎖！'},
  '14':{title:'✨ 乘法試煉完成！\n乘法天才就是你！',unlock:'🔓 除法試煉已解鎖！'},
  '18':{title:'👑 燃燒星完全制霸！\n守護神即將甦醒！',unlock:'🌟 你是燃燒星的英雄！'},
};
let _celebWinCb=null;
function showCelebration(id, afterCb){
  const data=CELEB_DATA[id];
  if(!data){afterCb();return;}
  _celebWinCb=afterCb;
  document.getElementById('celebHero').innerHTML=heroSVG(3);
  document.getElementById('celebTitle').textContent=data.title;
  document.getElementById('celebUnlock').textContent=data.unlock;
  const btn=document.getElementById('celebContinue');
  btn.classList.remove('visible');
  // Burst particles
  const cp=document.getElementById('celebParticles');
  cp.innerHTML='';
  const cols=['#ffd700','#ff9900','#ff4400','#ffffff','#00ffaa','#ff00cc'];
  for(let i=0;i<40;i++){
    const d=document.createElement('div');
    d.className='celeb-burst';
    const ang=Math.random()*Math.PI*2;
    const dist=60+Math.random()*220;
    d.style.cssText=`left:50%;top:50%;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;`+
      `background:${cols[Math.floor(Math.random()*cols.length)]};`+
      `--bx:${Math.cos(ang)*dist}px;--by:${Math.sin(ang)*dist}px;`+
      `animation-duration:${0.8+Math.random()*0.8}s;animation-delay:${Math.random()*0.4}s`;
    cp.appendChild(d);
  }
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-celebrate').classList.add('active');
  setTimeout(()=>btn.classList.add('visible'),3000);
}
function finishCelebration(){
  if(_celebWinCb){_celebWinCb();_celebWinCb=null;}
}

function retryLevel(){if(curId) startLevel(curId);}

function pauseGame(){
  if(!document.getElementById('s-game').classList.contains('active')) return;
  clearTimers();
  GS.paused=true;
  document.getElementById('pauseOverlay').classList.add('active');
}
function resumeGame(){
  document.getElementById('pauseOverlay').classList.remove('active');
  GS.paused=false;
  startLvTimer();
  // restart per-question bar
  const maxSecs=LEVELS[curId].sc[LEVELS[curId].sc.length-1][0]+8;
  GS.qTimerId=setInterval(()=>{
    const el=(Date.now()-GS.qStartT)/1000;
    document.getElementById('qBar').style.width=Math.max(0,100-el/maxSecs*100)+'%';
  },100);
}
function quitGame(){
  clearTimers();
  document.getElementById('pauseOverlay').classList.remove('active');
  goTo('s-world');
}

// ═══════════════════════════════════════════════
// SCREEN NAV
// ═══════════════════════════════════════════════
function refreshStarsDisplay(){
  const el=document.getElementById('planetStarsDisplay');
  if(el) el.textContent=`⭐ ${SS.stars()}`;
}

function goTo(id){
  const cur=document.querySelector('.screen.active');
  const next=document.getElementById(id);
  if(!next) return;
  const doShow=()=>{
    document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active','fade-out');});
    next.style.opacity='0';
    next.classList.add('active');
    requestAnimationFrame(()=>requestAnimationFrame(()=>{next.style.opacity='';}) );
    if(id==='s-world') renderWorld();
    if(id==='s-collection') renderCollection();
    if(id==='s-planet') refreshStarsDisplay();
  };
  if(cur && cur!==next){
    cur.classList.add('fade-out');
    setTimeout(doShow,200);
  } else {
    doShow();
  }
}

function openCollection(){goTo('s-collection');}

// ═══════════════════════════════════════════════
// WORLD MAP
// ═══════════════════════════════════════════════
function renderWorld(){
  const g=document.getElementById('opsGrid');
  g.innerHTML='';
  for(const op of OPS){
    const done=op.ids.filter(id=>SS.lv(id)).length;
    const el=document.createElement('div');
    el.className='op-card';
    el.innerHTML=`<div class="op-icon">${op.icon}</div>
<div class="op-name">${op.name}</div>
<div class="op-count">${done}/${op.ids.length} 關完成</div>
<div class="op-progress-wrap"><div class="op-progress-bar" style="width:${done/op.ids.length*100}%"></div></div>`;
    el.onclick=()=>renderLevelSelect(op);
    g.appendChild(el);
  }
}

// ═══════════════════════════════════════════════
// LEVEL SELECT
// ═══════════════════════════════════════════════
const MON_ICON={imp:'😈',golem:'🪨',dragon:'🐉',demon:'👹'};
let curOp=null;
function renderLevelSelect(op){
  curOp=op;
  document.getElementById('lvlSelTitle').textContent=op.name+' 關卡';
  // Breadcrumb
  document.getElementById('lvlBreadcrumb').innerHTML=
    `<span onclick="goTo('s-title')">首頁</span>`+
    `<span class="bc-sep">＞</span>`+
    `<span onclick="goTo('s-planet')">燃燒星</span>`+
    `<span class="bc-sep">＞</span>`+
    `<span class="bc-cur">${op.name}</span>`;
  // Progress
  const done=op.ids.filter(id=>SS.lv(id)).length;
  const total=op.ids.length;
  document.getElementById('lvlProgLabel').textContent=`${op.name}進度：${done} / ${total} 關完成`;
  document.getElementById('lvlProgFill').style.width=(done/total*100)+'%';
  const list=document.getElementById('levelsList');
  list.innerHTML='';
  for(const id of op.ids){
    const lv=LEVELS[id], saved=SS.lv(id), locked=!SS.unlocked(id);
    const card=document.createElement('div');
    card.className='level-card'+(locked?' locked':'');
    let grHtml='', scHtml='', trHtml='';
    if(saved?.grade) grHtml=`<span class="grade-chip g-${saved.grade}">${saved.grade}</span>`;
    if(saved?.score!=null) scHtml=`<span class="level-score">最高 ${saved.score} 分</span>`;
    if(saved?.treasure) trHtml=`<span style="font-size:16px">${lv.tr.i}</span>`;
    card.innerHTML=`
<div class="level-num-badge">${id}</div>
<div class="level-info">
  <div class="level-name">${lv.name}</div>
  <div class="level-meta">時限 ${lv.time}s｜${lv.mnm}</div>
  <div class="level-rec">${grHtml}${scHtml}${trHtml}</div>
</div>${locked?'<div class="lock-icon">🔒</div>':''}`;
    if(!locked) card.onclick=()=>startLevel(id);
    list.appendChild(card);
  }
  goTo('s-levels');
}

// COLLECTION
// ═══════════════════════════════════════════════
function renderCollection(){
  document.getElementById('starsTotalRow').textContent=`⭐ 累積碎片：${SS.stars()} 顆`;
  const g=document.getElementById('treasuresGrid');
  g.innerHTML='';
  for(const[id,lv] of Object.entries(LEVELS)){
    const has=SS.hasTr(id);
    const s=document.createElement('div');
    s.className='t-slot'+(has?' earned':' locked-t');
    s.innerHTML=has
      ?`<div class="tsi">${lv.tr.i}</div><div class="tsn">${lv.tr.n}</div><div class="tsf">關卡 ${id}</div>`
      :`<div class="tsi">❓</div><div class="tsf">關卡 ${id}</div>`;
    g.appendChild(s);
  }
}

// ═══════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════
function handleInput(v){
  if(v==='C'){GS.ans='';document.getElementById('ansDisplay').textContent='_';}
  else if(v==='OK'){submit();}
  else{
    sfx('key');
    if(GS.ans.length<6){GS.ans+=v;document.getElementById('ansDisplay').textContent=GS.ans;}
  }
}

document.querySelectorAll('.nbtn').forEach(b=>{
  b.addEventListener('pointerdown',e=>{e.preventDefault();handleInput(b.dataset.v);});
});

document.addEventListener('keydown',e=>{
  if(document.getElementById('s-game').classList.contains('active')){
    if('0123456789'.includes(e.key)) handleInput(e.key);
    else if(e.key==='Enter') handleInput('OK');
    else if(e.key==='Backspace'){
      e.preventDefault();
      GS.ans=GS.ans.slice(0,-1);
      document.getElementById('ansDisplay').textContent=GS.ans||'_';
    }
    else if(e.key==='Escape') handleInput('C');
  }
});
