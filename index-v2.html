<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Hero — 勇者的數學試煉</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap');

:root {
  --bg: #0a0e1a;
  --surface: rgba(8,16,36,0.88);
  --primary: #00d4ff;
  --secondary: #7b2fff;
  --accent: #ff2d78;
  --success: #00ff88;
  --warning: #ffaa00;
  --gold: #f0c040;
  --text: #d0e8ff;
  --dim: rgba(160,200,255,0.55);
  --glow-sm: 0 0 8px rgba(0,212,255,0.45);
  --glow-md: 0 0 15px rgba(0,212,255,0.5),0 0 30px rgba(0,212,255,0.2);
  --glow-lg: 0 0 22px rgba(0,212,255,0.7),0 0 44px rgba(0,212,255,0.3);
  --glow-red: 0 0 15px rgba(255,45,120,0.7),0 0 30px rgba(255,45,120,0.3);
  --glow-green: 0 0 15px rgba(0,255,136,0.6),0 0 30px rgba(0,255,136,0.2);
  --glow-purple: 0 0 15px rgba(123,47,255,0.6),0 0 30px rgba(123,47,255,0.2);
}

*{box-sizing:border-box;margin:0;padding:0;}

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 15%, rgba(0,212,255,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(123,47,255,0.06) 0%, transparent 55%);
  color: var(--text);
  font-family: 'Orbitron','Noto Sans TC',sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.022) 1px, transparent 1px);
  background-size:44px 44px;
  pointer-events:none;z-index:0;
}

.screen{display:none;min-height:100vh;padding:10px;position:relative;z-index:1;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* ===== TITLE ===== */
#screen-title{
  background: radial-gradient(ellipse at 50% 40%, #0d1b3e 0%, #050a14 70%);
  overflow:hidden;
}
.stars-bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.title-logo{text-align:center;margin-bottom:28px;position:relative;z-index:1;}
.title-logo h1{
  font-size:clamp(26px,6vw,52px);font-weight:900;
  background:linear-gradient(135deg,#00d4ff 0%,#7b2fff 55%,#00d4ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(0,212,255,0.6));
  letter-spacing:4px;line-height:1.3;
}
.title-logo .subtitle{
  font-size:clamp(9px,2vw,13px);color:var(--dim);margin-top:10px;
  letter-spacing:3px;font-family:'Noto Sans TC',sans-serif;
}
.title-hero-emoji{
  font-size:80px;display:block;margin:16px auto;
  animation:float 2.5s ease-in-out infinite;
  filter:drop-shadow(0 0 25px rgba(0,212,255,0.7));
}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}

/* ===== BUTTONS ===== */
.btn{
  display:inline-block;padding:14px 30px;
  border:2px solid var(--primary);background:rgba(0,212,255,0.08);
  color:var(--primary);cursor:pointer;
  font-family:'Orbitron',sans-serif;font-size:clamp(9px,2vw,12px);
  letter-spacing:2px;text-transform:uppercase;
  transition:all 0.2s;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  box-shadow:var(--glow-sm);user-select:none;-webkit-tap-highlight-color:transparent;
}
.btn:hover{background:rgba(0,212,255,0.2);box-shadow:var(--glow-lg);transform:translateY(-2px);}
.btn:active{transform:scale(0.96) translateY(1px);}
.btn-primary{border-color:var(--primary);color:var(--primary);background:rgba(0,212,255,0.08);}
.btn-primary:hover{background:rgba(0,212,255,0.22);box-shadow:0 0 25px rgba(0,212,255,0.8),0 0 50px rgba(0,212,255,0.3);}
.btn-secondary{border-color:var(--secondary);color:rgba(180,130,255,0.9);background:rgba(123,47,255,0.08);box-shadow:var(--glow-purple);}
.btn-secondary:hover{background:rgba(123,47,255,0.2);box-shadow:0 0 25px rgba(123,47,255,0.7);}
.btn-success{border-color:var(--success);color:var(--success);background:rgba(0,255,136,0.08);box-shadow:var(--glow-green);}
.btn-success:hover{background:rgba(0,255,136,0.2);box-shadow:0 0 25px rgba(0,255,136,0.7);}
.back-btn{position:absolute;top:10px;left:10px;font-size:8px;padding:8px 14px;z-index:10;}

/* ===== MAP ===== */
#screen-map{position:relative;overflow:hidden;}
#screen-map::after{
  content:'';position:absolute;top:-4px;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--primary),transparent);
  animation:scanLine 5s linear infinite;pointer-events:none;z-index:2;
}
@keyframes scanLine{0%{top:-4px;opacity:0.7;}100%{top:100%;opacity:0.7;}}
.map-title{
  font-size:clamp(14px,3.5vw,22px);font-weight:700;
  color:var(--primary);text-shadow:0 0 20px rgba(0,212,255,0.8);
  margin-bottom:6px;text-align:center;letter-spacing:3px;
  position:relative;z-index:1;margin-top:30px;
}
.map-world{
  font-size:clamp(8px,1.8vw,11px);color:var(--dim);
  margin-bottom:28px;text-align:center;letter-spacing:2px;
  font-family:'Noto Sans TC',sans-serif;position:relative;z-index:1;
}
.levels-grid{
  display:flex;gap:20px;flex-wrap:wrap;justify-content:center;
  position:relative;z-index:1;max-width:720px;width:100%;
}
.level-card{
  background:var(--surface);border:1.5px solid;
  padding:20px 16px;text-align:center;cursor:pointer;
  width:clamp(160px,27vw,200px);
  transition:transform 0.2s,box-shadow 0.2s;position:relative;
  -webkit-tap-highlight-color:transparent;
  clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);
}
.level-card.unlocked{
  border-color:rgba(0,212,255,0.55);
  box-shadow:0 0 18px rgba(0,212,255,0.22),inset 0 0 20px rgba(0,212,255,0.04);
}
.level-card.unlocked:hover{transform:translateY(-8px);box-shadow:0 0 35px rgba(0,212,255,0.5),inset 0 0 30px rgba(0,212,255,0.06);}
.level-card.locked{border-color:rgba(80,80,100,0.4);opacity:0.48;cursor:not-allowed;filter:grayscale(0.8);}
.level-card-enemy{font-size:32px;margin-bottom:8px;}
.level-card .level-num{font-size:clamp(9px,2vw,12px);color:var(--primary);margin-bottom:6px;letter-spacing:1px;font-weight:700;}
.level-card .level-desc{font-size:9px;color:var(--dim);margin-bottom:10px;line-height:1.7;font-family:'Noto Sans TC',sans-serif;}
.level-card .level-time{font-size:8px;color:var(--warning);margin-bottom:10px;letter-spacing:1px;}
.stars-display{display:flex;justify-content:center;gap:4px;font-size:18px;margin-bottom:6px;}
.star-empty{filter:grayscale(1) opacity(0.3);}
.level-card .best-score{font-size:7px;color:var(--dim);font-family:'Noto Sans TC',sans-serif;}

/* ===== GAME SCREEN ===== */
#screen-game{
  padding:8px;justify-content:flex-start;
  gap:0;min-height:100vh;overflow:visible;
}
.hud{
  width:100%;max-width:600px;
  display:flex;flex-direction:column;gap:6px;
  margin-bottom:8px;overflow:visible;
}
.hud-row1{display:flex;justify-content:space-between;align-items:center;gap:8px;overflow:visible;}
.hud-fighter{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;overflow:visible;}

/* ===== SVG SPRITE CHARACTERS ===== */
.fighter-sprite{
  display:inline-flex;align-items:center;justify-content:center;
  position:relative;line-height:0;
}
.fighter-sprite svg{
  max-height:clamp(52px,7.5vh,76px);
  width:auto;
}
[data-char="hero"]{
  animation:heroIdle 2.2s ease-in-out infinite;
  filter:drop-shadow(0 0 10px rgba(0,212,255,0.45));
}
[data-char="imp"]{
  animation:impIdle 1.6s ease-in-out infinite;
  filter:drop-shadow(0 0 12px rgba(255,120,0,0.6));
}
[data-char="golem"]{
  animation:golemIdle 3s ease-in-out infinite;
  filter:drop-shadow(0 0 10px rgba(255,140,0,0.35));
}
[data-char="demon"]{
  animation:demonIdle 2s ease-in-out infinite;
  filter:drop-shadow(0 0 14px rgba(123,47,255,0.7));
}
@keyframes heroIdle{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
}
@keyframes impIdle{
  0%,100%{transform:scaleY(1) translateY(0);}
  50%{transform:scaleY(1.08) translateY(-4px);}
}
@keyframes golemIdle{
  0%,100%{transform:rotate(0deg) translateX(0);}
  30%{transform:rotate(-1.8deg) translateX(-3px);}
  70%{transform:rotate(1.8deg) translateX(3px);}
}
@keyframes demonIdle{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-6px) scale(1.03);}
}

.fighter-label{font-size:7px;color:var(--dim);letter-spacing:1px;font-family:'Noto Sans TC',sans-serif;}
.hp-bar-wrap{
  width:100%;background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.08);
  height:14px;position:relative;overflow:hidden;border-radius:2px;
}
.hp-bar{height:100%;transition:width 0.5s cubic-bezier(0.22,0.61,0.36,1);border-radius:2px;}
.hp-bar.hero{background:linear-gradient(90deg,#ff2d78,#ff6b9d);box-shadow:0 0 10px rgba(255,45,120,0.8);}
.hp-bar.monster{background:linear-gradient(90deg,#00d4ff,#00ff88);box-shadow:0 0 10px rgba(0,212,255,0.8);}
.hp-text{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;color:#fff;
  text-shadow:0 0 4px #000,0 0 8px rgba(0,0,0,0.8);
  font-family:'Orbitron',sans-serif;
}
.hud-center{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:90px;}
.timer-display{
  font-size:clamp(22px,5vw,34px);font-weight:900;
  color:var(--primary);
  text-shadow:0 0 15px rgba(0,212,255,0.9),0 0 30px rgba(0,212,255,0.4);
  transition:color 0.3s,text-shadow 0.3s;letter-spacing:2px;
}
.timer-display.urgent{
  color:var(--accent)!important;
  text-shadow:0 0 15px rgba(255,45,120,1),0 0 30px rgba(255,45,120,0.6)!important;
  animation:flash 0.5s infinite;
}
@keyframes flash{0%,100%{opacity:1;}50%{opacity:0.25;}}
.progress-text{font-size:7px;color:var(--dim);text-align:center;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;}
.score-text{font-size:8px;color:var(--gold);text-align:center;text-shadow:0 0 8px rgba(240,192,64,0.6);font-family:'Noto Sans TC',sans-serif;}

/* ===== BATTLE AREA ===== */
.battle-area{
  width:100%;max-width:600px;flex:1;
  display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;
}
.question-box{
  background:rgba(0,15,35,0.92);
  border:1.5px solid rgba(0,212,255,0.55);border-radius:6px;
  padding:18px 24px;text-align:center;width:100%;position:relative;
  animation:qPulse 3s ease-in-out infinite;
}
@keyframes qPulse{
  0%,100%{box-shadow:0 0 15px rgba(0,212,255,0.15),inset 0 0 30px rgba(0,212,255,0.03);}
  50%{box-shadow:0 0 30px rgba(0,212,255,0.28),inset 0 0 40px rgba(0,212,255,0.06);}
}
.question-text{
  font-size:clamp(32px,9vw,58px);color:#fff;font-weight:900;
  text-shadow:0 0 20px rgba(0,212,255,0.8),0 0 40px rgba(0,212,255,0.35),0 0 60px rgba(0,212,255,0.1);
  letter-spacing:6px;line-height:1.15;
}
.per-question-timer{display:flex;align-items:center;gap:8px;margin-top:10px;justify-content:center;}
.per-q-bar-wrap{
  flex:1;max-width:200px;background:rgba(0,0,0,0.4);
  border:1px solid rgba(0,212,255,0.18);height:6px;overflow:hidden;border-radius:3px;
}
.per-q-bar{
  height:100%;
  background:linear-gradient(90deg,#00ff88,#00d4ff,#ffaa00,#ff2d78);
  transition:width 0.3s linear;border-radius:3px;
  box-shadow:0 0 6px rgba(0,212,255,0.5);
}
.per-q-time{font-size:8px;color:var(--dim);min-width:28px;font-family:'Orbitron',sans-serif;}

/* ===== FEEDBACK ===== */
.feedback-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:100;
  display:flex;align-items:center;justify-content:center;
}
.feedback-text{
  font-size:clamp(17px,4vw,30px);font-weight:700;
  padding:14px 28px;border-radius:4px;opacity:0;
  transform:scale(0.5) translateY(20px);
  transition:opacity 0.15s,transform 0.15s;
  text-align:center;pointer-events:none;
  font-family:'Noto Sans TC',sans-serif;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.feedback-text.correct{background:rgba(0,40,20,0.92);color:var(--success);border:2px solid var(--success);box-shadow:var(--glow-green);}
.feedback-text.wrong{background:rgba(40,0,15,0.92);color:var(--accent);border:2px solid var(--accent);box-shadow:var(--glow-red);}
.feedback-text.show{opacity:1;transform:scale(1) translateY(0);}

.flash-overlay{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:99;opacity:0;transition:opacity 0.12s;}
.flash-overlay.correct-flash{background:rgba(0,255,136,0.14);}
.flash-overlay.wrong-flash{background:rgba(255,45,120,0.18);}

/* ===== ANSWER DISPLAY ===== */
.answer-display{
  background:rgba(0,10,30,0.9);border:2px solid rgba(0,212,255,0.45);border-radius:4px;
  padding:10px 20px;min-width:160px;text-align:center;
  font-size:clamp(22px,6vw,36px);color:var(--primary);letter-spacing:5px;
  min-height:54px;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--glow-sm),inset 0 0 20px rgba(0,212,255,0.04);font-weight:700;
}
.answer-cursor{animation:blink 0.7s infinite;color:rgba(0,212,255,0.45);font-size:0.7em;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ===== NUMPAD ===== */
.numpad{width:100%;max-width:340px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px;}
.num-btn{
  background:rgba(0,10,30,0.8);border:1.5px solid rgba(0,212,255,0.35);
  color:var(--primary);font-family:'Orbitron',sans-serif;
  font-size:clamp(15px,4vw,22px);font-weight:700;
  padding:14px 8px;cursor:pointer;text-align:center;
  transition:all 0.12s;-webkit-tap-highlight-color:transparent;
  user-select:none;border-radius:3px;letter-spacing:1px;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.num-btn:hover{background:rgba(0,212,255,0.1);box-shadow:var(--glow-sm);border-color:rgba(0,212,255,0.7);}
.num-btn:active,.num-btn.pressed{background:rgba(0,212,255,0.18);transform:scale(0.93);box-shadow:0 0 15px rgba(0,212,255,0.5);}
.num-btn.btn-clear{border-color:rgba(255,45,120,0.45);color:var(--accent);background:rgba(30,0,15,0.7);}
.num-btn.btn-clear:hover{background:rgba(255,45,120,0.14);box-shadow:var(--glow-red);}
.num-btn.btn-confirm{border-color:rgba(0,255,136,0.45);color:var(--success);background:rgba(0,20,10,0.7);font-size:clamp(18px,4.5vw,26px);}
.num-btn.btn-confirm:hover{background:rgba(0,255,136,0.14);box-shadow:var(--glow-green);}
.num-btn.btn-zero{grid-column:1/3;}

/* ===== RESULT SCREEN ===== */
#screen-result{text-align:center;gap:16px;}
.result-title{font-size:clamp(16px,4vw,26px);font-weight:700;letter-spacing:3px;margin-bottom:6px;}
.result-title.win{color:var(--primary);text-shadow:0 0 20px rgba(0,212,255,0.9),0 0 40px rgba(0,212,255,0.4);}
.result-title.lose{color:var(--accent);text-shadow:0 0 20px rgba(255,45,120,0.9),0 0 40px rgba(255,45,120,0.4);}
.stars-result{display:flex;justify-content:center;gap:8px;font-size:clamp(40px,10vw,64px);margin:8px 0;}
.star-result{animation:star-pop 0.4s ease backwards;filter:drop-shadow(0 0 12px rgba(255,215,0,0.9));}
@keyframes star-pop{from{transform:scale(0) rotate(-180deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.result-stats{
  background:var(--surface);border:1.5px solid rgba(0,212,255,0.28);border-radius:4px;
  padding:16px 24px;max-width:400px;width:90%;
  box-shadow:var(--glow-sm),inset 0 0 20px rgba(0,212,255,0.03);
}
.stat-row{display:flex;justify-content:space-between;font-size:clamp(8px,1.8vw,11px);padding:7px 0;border-bottom:1px solid rgba(0,212,255,0.07);gap:16px;}
.stat-row:last-child{border-bottom:none;}
.stat-label{color:var(--dim);font-family:'Noto Sans TC',sans-serif;}
.stat-value{color:var(--primary);font-weight:700;}
.result-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

/* ===== LEVEL BANNER ===== */
.level-banner{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(5,8,20,0.93);
  display:flex;align-items:center;justify-content:center;
  z-index:200;flex-direction:column;gap:16px;
  backdrop-filter:blur(4px);
}
.level-banner-title{font-size:clamp(16px,4vw,28px);font-weight:700;color:var(--primary);text-shadow:0 0 20px rgba(0,212,255,0.8);text-align:center;letter-spacing:3px;}
.level-banner-sub{font-size:clamp(9px,2.5vw,14px);color:var(--dim);text-align:center;font-family:'Noto Sans TC',sans-serif;}
.countdown-big{
  font-size:clamp(70px,18vw,120px);font-weight:900;
  color:var(--primary);
  text-shadow:0 0 30px rgba(0,212,255,1),0 0 60px rgba(0,212,255,0.6),0 0 90px rgba(0,212,255,0.3);
  animation:count-pop 0.5s ease;
}
@keyframes count-pop{from{transform:scale(1.6);opacity:0.4;}to{transform:scale(1);opacity:1;}}

/* ===== BATTLE ANIMATIONS ===== */
@keyframes heroAttack{
  0%  {transform:translateX(0) scale(1);filter:drop-shadow(0 0 10px rgba(0,212,255,0.5));}
  35% {transform:translateX(130px) scale(1.35);filter:drop-shadow(0 0 28px rgba(0,212,255,1));}
  62% {transform:translateX(130px) scale(1.35);}
  100%{transform:translateX(0) scale(1);filter:drop-shadow(0 0 10px rgba(0,212,255,0.5));}
}
@keyframes monsterHit{
  0%,100%{transform:translateX(0) rotate(0);}
  15%    {transform:translateX(14px) rotate(10deg) scale(0.88);}
  30%    {transform:translateX(-14px) rotate(-10deg) scale(0.88);}
  50%    {transform:translateX(9px) rotate(6deg);}
  70%    {transform:translateX(-9px) rotate(-6deg);}
  85%    {transform:translateX(5px) rotate(3deg);}
}
@keyframes monsterAttack{
  0%  {transform:translateX(0) scale(1);filter:drop-shadow(0 0 10px rgba(255,45,120,0.5));}
  35% {transform:translateX(-130px) scale(1.35);filter:drop-shadow(0 0 28px rgba(255,45,120,1));}
  62% {transform:translateX(-130px) scale(1.35);}
  100%{transform:translateX(0) scale(1);filter:drop-shadow(0 0 10px rgba(255,45,120,0.5));}
}
@keyframes heroHit{
  0%,100%{transform:translateX(0) rotate(0);}
  15%    {transform:translateX(-12px) rotate(-8deg) scale(0.88);}
  30%    {transform:translateX(12px) rotate(8deg) scale(0.88);}
  50%    {transform:translateX(-8px) rotate(-5deg);}
  70%    {transform:translateX(8px) rotate(5deg);}
  85%    {transform:translateX(-4px) rotate(-2deg);}
}
@keyframes damageFloat{
  0%  {opacity:1;transform:translateX(-50%) translateY(0) scale(1.3);}
  20% {opacity:1;transform:translateX(-50%) translateY(-15px) scale(1.1);}
  100%{opacity:0;transform:translateX(-50%) translateY(-75px) scale(0.7);}
}
@keyframes monsterExplode{
  0%  {transform:scale(1);opacity:1;filter:brightness(1) saturate(1);}
  20% {transform:scale(1.6) rotate(8deg);opacity:1;filter:brightness(5) saturate(2);}
  50% {transform:scale(2.5) rotate(-15deg);opacity:0.6;filter:brightness(8) saturate(3);}
  80% {transform:scale(3.5) rotate(20deg);opacity:0.2;filter:brightness(12);}
  100%{transform:scale(5);opacity:0;}
}

<script>
// ==================== AUDIO ====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
function playTone(freq, type, dur, gain=0.3, delay=0) {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
  g.gain.setValueAtTime(gain, audioCtx.currentTime + delay);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + dur);
  o.start(audioCtx.currentTime + delay);
  o.stop(audioCtx.currentTime + delay + dur + 0.05);
}
const SFX = {
  correct(){ playTone(880,'square',0.12,0.25); playTone(1320,'square',0.12,0.2,0.12); },
  wrong(){ playTone(180,'sawtooth',0.35,0.3); },
  superFast(){ [880,1100,1320,1760].forEach((f,i)=>playTone(f,'square',0.1,0.25,i*0.08)); },
  win(){ [523,659,784,1047].forEach((f,i)=>playTone(f,'square',0.25,0.3,i*0.15)); },
  lose(){ [440,330,220,110].forEach((f,i)=>playTone(f,'sawtooth',0.3,0.25,i*0.2)); },
  urgentTick(){ playTone(660,'square',0.06,0.2); },
  numPress(){ playTone(440,'square',0.05,0.1); }
};

// ==================== LEVELS ====================
const LEVELS = [
  { id:'1-1', name:'關卡 1-1', desc:'個位數加法', time:90,
    enemy:'🔥', enemyName:'火焰小怪',
    gen(){ const a=rand(1,9),b=rand(1,9); return{a,b,ans:a+b}; }
  },
  { id:'1-2', name:'關卡 1-2', desc:'兩位數加法（不進位）', time:120,
    enemy:'🌋', enemyName:'火山石怪',
    gen(){
      let a,b;
      do {
        const a1=rand(1,8),b1=rand(0,9-a1);
        const a10=rand(1,8),b10=rand(1,9-a10);
        a=a10*10+a1; b=b10*10+b1;
      } while(a<10||b<10);
      return{a,b,ans:a+b};
    }
  },
  { id:'1-3', name:'關卡 1-3', desc:'兩位數加法（有進位）', time:150,
    enemy:'😈', enemyName:'火焰魔王',
    gen(){
      let a,b;
      do {
        const a1=rand(2,9),b1=rand(10-a1,9);
        const a10=rand(1,8),b10=rand(1,8);
        a=a10*10+a1; b=b10*10+b1;
      } while(a+b>199||a<10||b<10);
      return{a,b,ans:a+b};
    }
  }
];

function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

// ==================== STATE ====================
let state = {
  level:null, score:0, questionIdx:0,
  heroHp:5, monsterHp:10, timeLeft:0,
  currentQ:null, qStartTime:0, answer:'',
  locked:false, timerId:null, perQTimerId:null,
  perQSeconds:0, urgentPlayed:false, urgentTickId:null,
  correctCount:0, wrongCount:0, totalQuestions:10
};

// ==================== STORAGE ====================
function saveProgress(levelId,score,stars){
  const key=`mh_${levelId}`;
  const prev=JSON.parse(localStorage.getItem(key)||'{"best":0,"stars":0}');
  if(score>prev.best) prev.best=score;
  if(stars>prev.stars) prev.stars=stars;
  localStorage.setItem(key,JSON.stringify(prev));
  if(stars>0){
    const idx=LEVELS.findIndex(l=>l.id===levelId);
    if(idx>=0&&idx<LEVELS.length-1)
      localStorage.setItem(`mh_${LEVELS[idx+1].id}_unlocked`,'1');
  }
}
function getLevelProgress(id){ return JSON.parse(localStorage.getItem(`mh_${id}`)||'{"best":0,"stars":0}'); }
function isUnlocked(id){ return id==='1-1'||!!localStorage.getItem(`mh_${id}_unlocked`); }

// ==================== SCREENS ====================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}
function showTitle(){ stopGame(); showScreen('title'); initStars(); }
function showMap(){ showScreen('map'); renderMap(); }

function renderMap(){
  const grid=document.getElementById('levelsGrid');
  grid.innerHTML='';
  LEVELS.forEach(lvl=>{
    const unlocked=isUnlocked(lvl.id);
    const prog=getLevelProgress(lvl.id);
    const card=document.createElement('div');
    card.className='level-card '+(unlocked?'unlocked':'locked');
    const starsHtml=[1,2,3].map(i=>`<span class="${i<=prog.stars?'':'star-empty'}">⭐</span>`).join('');
    card.innerHTML=`
      <div class="level-card-enemy">${unlocked?lvl.enemy:'🔒'}</div>
      <div class="level-num">${lvl.name}</div>
      <div class="level-desc">${lvl.desc}</div>
      <div class="level-time">⏱ ${lvl.time}秒</div>
      <div class="stars-display">${starsHtml}</div>
      <div class="best-score">${prog.best>0?'最高分：'+prog.best:'尚未挑戰'}</div>
    `;
    if(unlocked) card.onclick=()=>startLevel(lvl);
    grid.appendChild(card);
  });
}

// ==================== GAME START ====================
function startLevel(lvl){
  ensureAudio(); stopGame();
  state={
    level:lvl, score:0, questionIdx:0,
    heroHp:5, monsterHp:10, timeLeft:lvl.time,
    currentQ:null, qStartTime:0, answer:'',
    locked:false, timerId:null, perQTimerId:null,
    perQSeconds:0, urgentPlayed:false, urgentTickId:null,
    correctCount:0, wrongCount:0, totalQuestions:10
  };
  showScreen('game');
  updateHUD();
  showLevelBanner(lvl, ()=>startCountdown());
}

function showLevelBanner(lvl,cb){
  const banner=document.createElement('div');
  banner.className='level-banner';
  banner.innerHTML=`
    <div class="level-banner-title">${lvl.enemy} ${lvl.name}</div>
    <div class="level-banner-sub">${lvl.desc}</div>
    <div class="level-banner-sub" style="color:rgba(160,200,255,0.4);">⏱ ${lvl.time}秒 ｜ 擊敗 ${lvl.enemyName}！</div>
    <div class="countdown-big" id="bannerCount">3</div>
  `;
  document.body.appendChild(banner);
  let c=3;
  const tick=()=>{
    const el=document.getElementById('bannerCount');
    if(!el) return;
    if(c<=0){ banner.remove(); cb(); return; }
    el.textContent=c;
    el.style.animation='none'; void el.offsetWidth; el.style.animation='count-pop 0.5s ease';
    playTone(c===1?880:440,'square',0.15,0.3);
    c--; setTimeout(tick,900);
  };
  setTimeout(tick,300);
}

function startCountdown(){
  state.timerId=setInterval(()=>{
    state.timeLeft--;
    updateTimer();
    if(state.timeLeft<=0) endGame('timeout');
  },1000);
  nextQuestion();
}

// ==================== GAME LOOP ====================
function nextQuestion(){
  if(state.questionIdx>=state.totalQuestions){ endGame('win'); return; }
  state.answer=''; state.locked=false;
  state.currentQ=state.level.gen();
  state.qStartTime=Date.now();
  state.perQSeconds=0;
  updateAnswerDisplay();
  document.getElementById('questionText').textContent=`${state.currentQ.a} + ${state.currentQ.b} = ?`;
  updatePerQTimer();
  clearInterval(state.perQTimerId);
  state.perQTimerId=setInterval(()=>{
    state.perQSeconds=Math.floor((Date.now()-state.qStartTime)/1000);
    updatePerQTimer();
  },200);
}

function updatePerQTimer(){
  const max=10;
  const pct=Math.max(0,100-(state.perQSeconds/max)*100);
  document.getElementById('perQBar').style.width=pct+'%';
  document.getElementById('perQTime').textContent=state.perQSeconds+'s';
}

function updateTimer(){
  const el=document.getElementById('timerDisplay');
  el.textContent=state.timeLeft;
  if(state.timeLeft<=30){
    el.classList.add('urgent');
    if(!state.urgentPlayed){
      state.urgentPlayed=true;
      state.urgentTickId=setInterval(()=>SFX.urgentTick(),1000);
    }
  } else {
    el.classList.remove('urgent');
  }
}

function monsterSVG(id){
  if(id==='1-1') return fireImpSVG();
  if(id==='1-2') return rockGolemSVG();
  return shadowDemonSVG();
}

// ==================== HUD ====================
function updateHUD(){
  const {heroHp,monsterHp,totalQuestions,score,questionIdx}=state;
  document.getElementById('heroHpBar').style.width=(heroHp/5*100)+'%';
  document.getElementById('heroHpText').textContent=`${Math.max(0,heroHp)}/5`;
  document.getElementById('monsterHpBar').style.width=(monsterHp/totalQuestions*100)+'%';
  document.getElementById('monsterHpText').textContent=`${Math.max(0,monsterHp)}/${totalQuestions}`;
  document.getElementById('progressText').textContent=`第 ${questionIdx}/${totalQuestions} 題`;
  document.getElementById('scoreText').textContent=`得分：${score}`;
  const heroEl=document.getElementById('heroEmoji');
  heroEl.innerHTML=heroSVG(heroHp);
  heroEl.dataset.char='hero';
  const monEl=document.getElementById('monsterEmoji');
  if(state.level){
    const charMap={'1-1':'imp','1-2':'golem','1-3':'demon'};
    monEl.innerHTML=monsterSVG(state.level.id);
    monEl.dataset.char=charMap[state.level.id]||'imp';
  }
}

function updateAnswerDisplay(){
  document.getElementById('answerVal').textContent=state.answer||'_';
}

// ==================== INPUT ====================
function numInput(digit){
  if(state.locked||!state.currentQ) return;
  if(state.answer.length>=4) return;
  state.answer+=digit;
  updateAnswerDisplay(); SFX.numPress(); flashBtn(digit);
}
function clearInput(){ if(state.locked) return; state.answer=''; updateAnswerDisplay(); }
function flashBtn(digit){
  document.querySelectorAll('.num-btn').forEach(b=>{
    if(b.textContent.trim()===digit){
      b.classList.add('pressed');
      setTimeout(()=>b.classList.remove('pressed'),150);
    }
  });
}

// ==================== CONFIRM ANSWER ====================
function confirmAnswer(){
  if(state.locked||!state.currentQ||state.answer==='') return;
  state.locked=true;
  clearInterval(state.perQTimerId);

  const ans=parseInt(state.answer,10);
  const correct=ans===state.currentQ.ans;
  const elapsed=(Date.now()-state.qStartTime)/1000;

  if(correct){
    let bonus=0, bonusLabel='';
    if(elapsed<=3)       { bonus=50; bonusLabel='神速！'; SFX.superFast(); }
    else if(elapsed<=5)  { bonus=30; bonusLabel='超快！'; SFX.correct(); }
    else if(elapsed<=10) { bonus=10; bonusLabel='不錯！'; SFX.correct(); }
    else                 { SFX.correct(); }
    const pts=100+bonus;
    state.score+=pts;
    state.questionIdx++;
    state.correctCount++;
    state.monsterHp--;
    updateHUD();
    showFeedback(`+${pts}分${bonusLabel?' '+bonusLabel:''}`, 'correct');
    flashScreen('correct-flash');

    if(state.monsterHp<=0){
      playHeroAttack(()=>playMonsterExplosion(()=>endGame('win')));
    } else {
      playHeroAttack(()=>{ spawnParticles('✦',5); nextQuestion(); });
    }
  } else {
    SFX.wrong();
    state.score=Math.max(0,state.score-20);
    state.wrongCount++;
    state.heroHp--;
    updateHUD();
    showFeedback('答錯了！-20分','wrong');
    flashScreen('wrong-flash');
    state.answer='';
    updateAnswerDisplay();

    if(state.heroHp<=0){
      playMonsterAttack(()=>endGame('lose'));
    } else {
      playMonsterAttack(()=>{
        state.locked=false;
        // Resume timer — qStartTime NOT reset, elapsed time keeps accumulating
        state.perQTimerId=setInterval(()=>{
          state.perQSeconds=Math.floor((Date.now()-state.qStartTime)/1000);
          updatePerQTimer();
        },200);
      });
    }
  }
}

// ==================== BATTLE ANIMATIONS ====================
function playHeroAttack(cb){
  const heroEl=document.getElementById('heroEmoji');
  const monEl=document.getElementById('monsterEmoji');
  heroEl.style.animation='none'; void heroEl.offsetWidth;
  heroEl.style.animation='heroAttack 0.55s ease';
  setTimeout(()=>{
    monEl.style.animation='none'; void monEl.offsetWidth;
    monEl.style.animation='monsterHit 0.45s ease';
    spawnDamageNumber(monEl,'-1♥','#ff2d78');
  },220);
  setTimeout(()=>{ heroEl.style.animation=''; monEl.style.animation=''; if(cb) cb(); },650);
}

function playMonsterAttack(cb){
  const heroEl=document.getElementById('heroEmoji');
  const monEl=document.getElementById('monsterEmoji');
  monEl.style.animation='none'; void monEl.offsetWidth;
  monEl.style.animation='monsterAttack 0.55s ease';
  setTimeout(()=>{
    heroEl.style.animation='none'; void heroEl.offsetWidth;
    heroEl.style.animation='heroHit 0.45s ease';
    spawnDamageNumber(heroEl,'-1♥','#ff8800');
  },220);
  setTimeout(()=>{ monEl.style.animation=''; heroEl.style.animation=''; if(cb) cb(); },650);
}

function spawnDamageNumber(targetEl,text,color){
  const rect=targetEl.getBoundingClientRect();
  const div=document.createElement('div');
  div.textContent=text;
  Object.assign(div.style,{
    position:'fixed',
    left: rect.left+rect.width/2+'px',
    top:  rect.top-4+'px',
    color: color,
    fontSize: 'clamp(16px,4vw,22px)',
    fontWeight: '900',
    pointerEvents: 'none',
    zIndex: '250',
    textShadow: `0 0 12px ${color},0 0 24px ${color}`,
    animation: 'damageFloat 1.1s ease-out forwards',
    fontFamily: "'Orbitron',sans-serif",
    whiteSpace: 'nowrap'
  });
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),1200);
}

function playMonsterExplosion(cb){
  const monEl=document.getElementById('monsterEmoji');
  monEl.style.animation='none'; void monEl.offsetWidth;
  monEl.style.animation='monsterExplode 0.75s ease-out forwards';
  spawnWinStars();
  setTimeout(()=>{ monEl.style.animation=''; if(cb) cb(); },950);
}

function spawnWinStars(){
  const cx=window.innerWidth/2, cy=window.innerHeight/3;
  const emojis=['⭐','✨','💫','⚡','🌟'];
  for(let i=0;i<18;i++){
    const angle=(i/18)*Math.PI*2;
    const dist=110+Math.random()*130;
    const bx=Math.cos(angle)*dist, by=Math.sin(angle)*dist;
    const s=document.createElement('div');
    s.textContent=emojis[i%emojis.length];
    Object.assign(s.style,{
      position:'fixed', left:cx+'px', top:cy+'px',
      fontSize: 14+Math.random()*18+'px',
      pointerEvents:'none', zIndex:'300',
      animation: `starBurstAnim ${0.55+Math.random()*0.45}s ease-out ${i*0.04}s forwards`,
    });
    s.style.setProperty('--bx',bx+'px');
    s.style.setProperty('--by',by+'px');
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1300);
  }
}

// ==================== EFFECTS ====================
function showFeedback(msg,type){
  const el=document.getElementById('feedbackText');
  el.textContent=msg; el.className='feedback-text '+type;
  void el.offsetWidth; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),950);
}
function flashScreen(cls){
  const el=document.getElementById('flashOverlay');
  el.className='flash-overlay '+cls; el.style.opacity='1';
  setTimeout(()=>{ el.style.opacity='0'; },150);
}
function spawnParticles(emoji,count){
  for(let i=0;i<count;i++){
    const p=document.createElement('div'); p.className='particle'; p.textContent=emoji;
    const x=Math.random()*window.innerWidth;
    const y=window.innerHeight*0.3+Math.random()*window.innerHeight*0.3;
    p.style.left=x+'px'; p.style.top=y+'px';
    const tx=(Math.random()-0.5)*200, ty=-(50+Math.random()*150);
    p.style.setProperty('--tx',tx+'px'); p.style.setProperty('--ty',ty+'px');
    p.style.animationDelay=(Math.random()*0.3)+'s';
    document.body.appendChild(p); setTimeout(()=>p.remove(),1400);
  }
}

// ==================== END GAME ====================
function endGame(reason){
  stopGame();
  let stars=0, title, msg;
  if(reason==='win'){
    if(state.score>=900) stars=3;
    else if(state.score>=600) stars=2;
    else stars=1;
    title='🎉 關卡通過！';
    const m3=['完美！數學英雄誕生！','太厲害了！你是數學天才！','無敵！火焰山臣服於你！'];
    const m2=['好棒！再練練更快！','很不錯！繼續努力！'];
    const m1=['通過了！繼續加油！','你做到了！練習使完美！'];
    msg=stars===3?m3[rand(0,2)]:stars===2?m2[rand(0,1)]:m1[rand(0,1)];
    SFX.win(); spawnParticles('⭐',15); spawnParticles('🎉',10);
    saveProgress(state.level.id,state.score,stars);
  } else if(reason==='lose'){
    title='💀 挑戰失敗...';
    msg=['再試一次！你一定可以的！','不要放棄！練習使完美！','加油！這次一定行！'][rand(0,2)];
    SFX.lose();
  } else {
    title='⏰ 時間到！';
    msg='時間不夠用！再試一次！';
    SFX.lose();
  }

  showScreen('result');
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultTitle').className='result-title '+(stars>0?'win':'lose');
  document.getElementById('resultMsg').textContent=msg;

  const starsEl=document.getElementById('starsResult');
  starsEl.innerHTML='';
  if(stars>0){
    for(let i=1;i<=3;i++){
      const s=document.createElement('span');
      s.className='star-result'; s.textContent=i<=stars?'⭐':'☆';
      s.style.animationDelay=(i*0.2)+'s';
      s.style.fontSize=i<=stars?'clamp(40px,10vw,64px)':'clamp(30px,7vw,48px)';
      s.style.opacity=i<=stars?'1':'0.3';
      starsEl.appendChild(s);
    }
  }

  const accuracy=state.correctCount+state.wrongCount>0
    ?Math.round(state.correctCount/(state.correctCount+state.wrongCount)*100):0;

  document.getElementById('resultStats').innerHTML=`
    <div class="stat-row"><span class="stat-label">最終得分</span><span class="stat-value">${state.score} 分</span></div>
    <div class="stat-row"><span class="stat-label">答對題數</span><span class="stat-value">${state.correctCount} / ${state.totalQuestions} 題</span></div>
    <div class="stat-row"><span class="stat-label">正確率</span><span class="stat-value">${accuracy}%</span></div>
    <div class="stat-row"><span class="stat-label">答錯次數</span><span class="stat-value">${state.wrongCount} 次</span></div>
    ${stars>0?`<div class="stat-row"><span class="stat-label">獲得星星</span><span class="stat-value">${'⭐'.repeat(stars)}</span></div>`:''}
  `;

  const btns=document.getElementById('resultButtons');
  btns.innerHTML='';
  const r=document.createElement('button'); r.className='btn btn-primary'; r.textContent='再試一次';
  r.onclick=()=>startLevel(state.level); btns.appendChild(r);
  const m=document.createElement('button'); m.className='btn btn-secondary'; m.textContent='關卡選擇';
  m.onclick=()=>showMap(); btns.appendChild(m);
}

function stopGame(){
  clearInterval(state.timerId); clearInterval(state.perQTimerId); clearInterval(state.urgentTickId);
  state.timerId=null; state.perQTimerId=null; state.urgentTickId=null;
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown',e=>{
  if(!document.getElementById('screen-game').classList.contains('active')) return;
  if(e.key>='0'&&e.key<='9') numInput(e.key);
  else if(e.key==='Enter') confirmAnswer();
  else if(e.key==='Backspace'||e.key==='Delete'){ state.answer=state.answer.slice(0,-1); updateAnswerDisplay(); }
  else if(e.key==='Escape') clearInput();
});

// ==================== STARFIELD ====================
function initStars(){
  const canvas=document.getElementById('starsCanvas'); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<150;i++){
    const x=Math.random()*canvas.width, y=Math.random()*canvas.height;
    const r=Math.random()*1.8;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    const hue=Math.random()>0.7?'rgba(180,160,255,':'rgba(160,220,255,';
    ctx.fillStyle=hue+(0.3+Math.random()*0.7)+')';
    ctx.fill();
  }
}
window.addEventListener('resize',()=>{
  if(document.getElementById('screen-title').classList.contains('active')) initStars();
});
initStars();
</script>
